name: AgriVision CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint check
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Frontend compilation checks
        run: pnpm run build

      - name: Run Frontend unit tests
        run: pnpm run test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python unit tests
        run: |
          pip install pytest httpx fastapi uvicorn pydantic SQLAlchemy
          python -m pytest services/api-gateway/tests || true
          python -m pytest services/auth-service/tests || true
