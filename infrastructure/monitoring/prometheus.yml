global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "agrivision-agent-orchestrator"
    static_configs:
      - targets: ["agent-orchestrator:8003"]
    metrics_path: "/metrics"

  - job_name: "agrivision-api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: "/metrics"
